<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>租事大吉 - AI 合約風險檢測</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">
    <header class="site-header px-5 py-3 flex items-center justify-between">
        <a href="index.html" class="brand-logo-wrap">
            <svg class="brand-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="houseGrad" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#2563EB"/>
                        <stop offset="100%" stop-color="#4F46E5"/>
                    </linearGradient>
                </defs>
                <!-- 房屋本體 -->
                <path d="M16 4L3 14h3v11a1 1 0 001 1h5v-7h8v7h5a1 1 0 001-1V14h3L16 4z" fill="url(#houseGrad)"/>
                <!-- 盾牌底部右角 -->
                <circle cx="23" cy="23" r="7" fill="#ffffff"/>
                <path d="M23 17c-1.8.6-3.5.6-5 0v4.5c0 2.2 1.8 3.8 5 4.5 3.2-.7 5-2.3 5-4.5V17c-1.5.6-3.2.6-5 0z" fill="url(#houseGrad)"/>
                <path d="M21 21.5l1.5 1.5 2.5-2.5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="brand-name">租事大吉</span>
        </a>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center px-6 text-center">
        <div class="max-w-md w-full">
            <h2 class="text-4xl font-bold text-gray-900 mb-2">保障租屋權益，</h2>
            <h2 class="text-4xl font-bold text-blue-600 mb-6">一拍即測。</h2>
            <p class="text-gray-500 text-lg mb-12">在房東面前也能優雅完成的合約健檢</p>

            <a href="upload.html"
                class="block bg-blue-600 hover:bg-blue-700 text-white rounded-3xl p-8 shadow-xl transform transition hover:scale-105">
                <div class="flex items-center justify-between">
                    <div class="text-left">
                        <p class="text-blue-200 text-sm mb-1">準備看房了嗎？</p>
                        <p class="text-2xl font-bold">開始檢測合約</p>
                    </div>
                    <svg class="w-12 h-12 text-white opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z">
                        </path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </div>
            </a>

            <div class="mt-12 space-y-4">
                <div class="flex items-center bg-white p-4 rounded-2xl shadow-sm">
                    <div class="bg-orange-100 p-3 rounded-xl mr-4">⚖️</div>
                    <div class="text-left">
                        <p class="font-bold text-gray-800">違法條款偵測</p>
                        <p class="text-gray-500 text-sm">依據最新內政部定型化契約範本比對</p>
                    </div>
                </div>
                <div class="flex items-center bg-white p-4 rounded-2xl shadow-sm">
                    <div class="bg-green-100 p-3 rounded-xl mr-4">💬</div>
                    <div class="text-left">
                        <p class="font-bold text-gray-800">談判建議生成</p>
                        <p class="text-gray-500 text-sm">AI 提供不傷和氣的委婉溝通話術</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-6 text-center text-gray-400 text-xs mt-auto">
        AI 分析結果僅供參考，不構成法律建議。如有疑慮，建議諮詢專業律師。
    </footer>
</body>

</html>
